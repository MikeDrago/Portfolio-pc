<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelangelo Drago | Graphic Design & Web Devoloper</title>
    <link rel="stylesheet" href="css/Home.css">
    <link rel="stylesheet" href="css/boot.css">
    <link rel="stylesheet" href="css/dock.css">
    <link rel="stylesheet" href="css/windows.css">
    <link rel="stylesheet" href="css/desktop-image.css">
    <link rel="stylesheet" href="css/terminal.css">
</head>
<body class="dark-mode">
 
  <!-- Boot Screen -->
  <div id="boot-screen">
    <div class="boot-logo">
      <!-- Logo semplice al posto della mela: sostituiscilo col tuo -->
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="boot-progress-track">
      <div class="boot-progress-fill" id="progressFill"></div>
    </div>
  </div>
 
    <!-- da qui si fa il desktop -->
    <div id="menu-bar">
    <div class="menu-left">
      <span class="menu-logo">◆</span>
      <span class="active-app-name" id="activeAppName">Finder</span>
    </div>
    <div class="menu-right">
      <span id="clock">--:--</span>
    </div>
  </div>
 
  <!-- DOCK -->
  <div id="dock-container">
    <div id="dock">
      <div class="dock-icon" data-name="Chi sono">
        <span class="dock-tooltip">Chi Sono</span>
        <img src="assets/Finder.png" alt="Progetti" style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div class="dock-icon" data-name="Progetti">
        <span class="dock-tooltip">Progetti</span>
        <img src="assets/folder.png" alt="Progetti" style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div class="dock-icon" data-name="Terminal">
        <span class="dock-tooltip">Terminal</span>
        <img src="assets/Terminal.png" alt="Progetti" style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div class="dock-icon" data-name="Mail">
        <span class="dock-tooltip">Mail</span>
        <img src="assets/Email.png" alt="Progetti" style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div class="dock-icon" data-name="CV">
        <span class="dock-tooltip">CV</span>
        📄
      </div>
    </div>
  </div>

  <div id="desktop">
    <!-- Le icone progetto vengono generate dal JS in posizioni sparse -->
  </div>

    <!-- Script Links -->
    <script src="js/boot.js"></script>
    <script src="js/dock.js"></script>
    <script src="js/window.js"></script>
    <script src="js/desktop-image.js"></script>
    <script src="js/terminal.js"></script>
</body>
</html>
